apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-rule
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-rule
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
