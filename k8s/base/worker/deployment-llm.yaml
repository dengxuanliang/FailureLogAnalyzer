apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-llm
  labels:
    app.kubernetes.io/name: worker-llm
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worker-llm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker-llm
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker-llm
          image: ghcr.io/org/fla-api:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --queues=llm
            - --concurrency=2
            - --loglevel=info
            - --without-gossip
            - --without-mingle
          envFrom:
            - configMapRef:
                name: fla-api-config
            - secretRef:
                name: fla-api
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A app.celery_app inspect ping -d celery@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
