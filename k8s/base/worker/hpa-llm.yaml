apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-llm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-llm
  minReplicas: 1
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
    scaleUp:
      stabilizationWindowSeconds: 15
