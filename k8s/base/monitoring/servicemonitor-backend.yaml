apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: failure-log-analyzer-backend
  labels:
    app.kubernetes.io/name: failure-log-analyzer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: failure-log-analyzer-api
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /api/v1/metrics
      interval: 30s
      scrapeTimeout: 10s
